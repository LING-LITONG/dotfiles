##### Basic #####

# 默认 shell
set -g default-shell /usr/bin/zsh

# 使用 256 色
set -g default-terminal "tmux-256color"

# 支持真彩色，iTerm2 推荐
set -ag terminal-overrides ",xterm-256color:RGB"

# 开启鼠标
set -g mouse on

# 历史滚动行数
set -g history-limit 50000

# 窗口和 pane 从 1 开始编号
set -g base-index 1
setw -g pane-base-index 1

# 自动重新编号窗口
set -g renumber-windows on

# 降低 Esc 延迟，对 vim/neovim 更友好
set -sg escape-time 10

# 状态栏刷新间隔
set -g status-interval 5


##### Prefix #####

# 保留默认 prefix: Ctrl+b
# 如果你想改成 Ctrl+a，取消下面三行注释
unbind C-b
set -g prefix C-a


##### Split panes #####

# 更直观的分屏快捷键
bind | split-window -h
bind - split-window -v

# 关闭当前 pane
bind x kill-pane

# 重新加载配置
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"


##### Pane navigation #####

# 使用 Alt + 方向键切换 pane，不需要先按 prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# 使用 prefix + h/j/k/l 切换 pane
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 调整 pane 大小
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


##### Copy mode #####

# vi 风格复制模式
setw -g mode-keys vi

# 进入复制模式
bind Enter copy-mode

# vi 模式下 v 开始选择，y 复制
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# 复制到 Windows 系统剪贴板 (WSL2)
# 通过 iconv 转 UTF-16LE 避免中文乱码
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "iconv -t UTF-16LE | clip.exe"

# 鼠标拖选后复制到 Windows 剪贴板 (WSL2)
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "iconv -t UTF-16LE | clip.exe"


##### Windows #####

# 新建窗口时保留当前路径
bind c new-window -c "#{pane_current_path}"

# 水平/垂直分屏时保留当前路径
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# 快速切换窗口
bind -n S-Left previous-window
bind -n S-Right next-window

# 按 prefix 两次显示窗口列表（含编号）
bind C-a choose-tree -w
# 按 prefix + w 也显示窗口列表
bind w choose-tree -w


##### Status bar #####

# 状态栏位置
set -g status-position bottom

# 状态栏基本样式
set -g status-style bg=default,fg=colour244

# 左侧显示 session 名称
set -g status-left-length 30
set -g status-left "#[fg=colour81,bold] #S #[default]"

# 右侧显示时间
set -g status-right-length 80
set -g status-right "#[fg=colour244]%Y-%m-%d %H:%M "

# 当前窗口样式
setw -g window-status-current-style fg=colour81,bold
setw -g window-status-current-format " #I:#W "

# 普通窗口样式
setw -g window-status-style fg=colour244
setw -g window-status-format " #I:#W "

# pane 边框
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour81


##### Misc #####

# 允许终端标题变化
set -g set-titles on
set -g set-titles-string "#S:#W"

# 避免某些程序退出后残留画面
set -g remain-on-exit off
